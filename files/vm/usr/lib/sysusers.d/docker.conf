# docker-ce's RPM group-creation scriptlet doesn't reliably run during a
# bootc/ostree image build, and docker.socket ships with SocketGroup=docker so
# it won't start unless the group exists. Declare it the ostree-native way:
# systemd-sysusers reconciles this on every boot, and it lives in immutable
# /usr rather than being baked into /etc at build time.
g docker -
