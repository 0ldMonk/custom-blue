# Not named crypt-ssh.conf: that's the package's own file, and /etc's 3-way
# merge would keep a local edit of it over ours. This sorts after it.
dropbear_port="2222"
dropbear_acl="/etc/dropbear/authorized_keys"

# SYSTEM = convert this machine's sshd host keys at regeneration time: nothing
# to pre-generate, and no separate known_hosts entry. Needs local regen —
# /etc/ssh keys are first-boot, absent at image build.
dropbear_rsa_key="SYSTEM"
dropbear_ecdsa_key="SYSTEM"
dropbear_ed25519_key="SYSTEM"
