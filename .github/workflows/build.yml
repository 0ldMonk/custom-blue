name: bluebuild
on:
  schedule:
    - cron:
        "00 06 * * *" # 20 minutes after last ublue images start building
  push:
    paths-ignore:
      - "**.md"

  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true
jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          # !! Add your recipes here
          - proart-nvidia.yml
          - proart-nvidia-cosmic.yml
          - desk.yml
          - virtual-machine.yml
    steps:
      - name: Build Custom Image
        uses: blue-build/github-action@v1.12
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}

          maximize_build_space: true
          chunkah: true
          use_cache: true
