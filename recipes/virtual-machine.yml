---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: monk-blue-vm
description: This is my personal OS image (headless Proxmox VM).

base-image: quay.io/fedora/fedora-bootc
image-version: "44"

modules:
  - from-file: modules/common-files.yml

  # NOT common-packages.yml — that has desktop-only packages (gnome-tweaks,
  # codium) that don't belong on a headless VM
  - from-file: modules/common-cli.yml

  - type: dnf
    install:
      packages:
      # docker and gang
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin
        - cloud-init # consumes Proxmox's Cloud-Init drive: network, hostname,
                      # and the pi user + its SSH key (Proxmox ciuser/sshkeys)
        - qemu-guest-agent
        - node-exporter

  - type: kargs
    kargs:
      - console=ttyS0 # serial console, for Proxmox's noVNC/xterm.js console

  # the pi USER ITSELF and its SSH key are deliberately NOT baked here — both
  # come from Proxmox's Cloud-Init (ciuser=pi + SSH public key set per
  # VM/template), so no key or user-creation logic is committed to this repo.
  - type: files
    files:
      - source: vm
        destination: /

  # git doesn't preserve arbitrary file modes, and the files module's plain
  # `cp` doesn't either — so /etc/sudoers.d/pi lands at a mode sudo rejects
  # (sudo requires exactly 0440; 0644 is explicitly refused), and the
  # reboot-required script needs its executable bit set explicitly too.
  - type: script
    snippets:
      - "chmod 0440 /etc/sudoers.d/pi"
      - "chmod 0755 /usr/libexec/rpm-ostree-reboot-required"

  # node-exporter and the reboot-required timer both auto-start on boot here
  # (unlike node-exporter's package-only precedent elsewhere) since the
  # reboot-required metric this VM cares about is meaningless without the
  # exporter actually running, and there's no separate Ansible step for it.
  - type: systemd
    system:
      enabled:
        - docker.service
        - node_exporter.service
        - rpm-ostree-reboot-required.timer
        - rpm-ostreed-automatic.timer

  - type: signing
