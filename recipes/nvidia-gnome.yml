---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: monk-blue-nvidia-gnome
description: This is my personal OS image (GNOME + nvidia-hybrid — shared by the laptop (AMD iGPU) and the desktop (Intel iGPU)).

base-image: ghcr.io/ublue-os/silverblue-main
image-version: latest

modules:
  # MUST run first, against the pristine base image: the akmods nvidia install
  # pulls 32-bit (i686) mesa, and if a prior dnf module (rpmfusion/firefox) has
  # already bumped the x86_64 mesa stack, the lagging i686 mesa conflicts.
  - from-file: modules/nvidia.yml

  - from-file: modules/common-files.yml
  - from-file: modules/common-fonts.yml
  - from-file: modules/common-kargs.yml
  - from-file: modules/common-gnome-extensions.yml
  - from-file: modules/common-packages.yml
  - from-file: modules/common-firefox.yml
  - from-file: modules/common-flatpaks.yml
  - from-file: modules/common-brew.yml
  - type: signing

  # Both machines are iGPU-display + nvidia-compute hybrids (laptop: AMD iGPU,
  # desktop: Intel iGPU). /etc/environment pins EGL to mesa so the GNOME session
  # renders on the iGPU, leaving nvidia free for compute (llama-server / local
  # LLM). The files/nvidia-hybrid/ dir is shared with nvidia-cosmic.
  - type: files
    files:
      - source: nvidia-hybrid
        destination: /

  - type: kargs
    kargs:
      - rcutree.enable_rcu_lazy=1

  - type: dnf
    repos:
      copr:
        - bieszczaders/kernel-cachyos-addons # provides ananicy-cpp
        - itotm/cachyos-kernel-znver4 # laptop-only: overlay cachy-os kernel live if needed
    # Keep the base's tuned-ppd (Fedora's default ppd-service provider since
    # F41) instead of swapping in power-profiles-daemon — matches the cosmic
    # image, which hard-requires tuned-ppd, so the fleet runs one power backend.
    install:
      packages:
        - ananicy-cpp
        - pam-u2f
        - pamu2fcfg
        - fido2-tools
        - kitty

  - type: default-flatpaks
    configurations:
      - scope: system
        install: []
