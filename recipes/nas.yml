---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: monk-blue-nas
description: This is my personal OS image (headless Proxmox NAS VM).

base-image: quay.io/fedora/fedora-bootc
image-version: "44"

modules:
  - from-file: modules/common-vm.yml

  # no systemd module on purpose: fedora-bootc:44 carries no preset for
  # cockpit/smb/nfs-server (verified in-image), so `disable *` leaves them
  # off until enabled per-machine
  - type: dnf
    repos:
      copr:
        - gotmax23/mergerfs # mergerfs isn't packaged in Fedora at all
    install:
      packages:
        - mergerfs
        - snapraid
        - cockpit
        - cockpit-storaged
        - samba # file-sharing RPM pulls only samba-common-tools; smbd needs this
        - nfs-utils
        # no Fedora package or live COPR exists (checked 2026-07); el9 noarch
        # RPM installs cleanly on f44. Pinned — version bumps are manual:
        - https://github.com/45Drives/cockpit-file-sharing/releases/download/v4.6.1/cockpit-file-sharing-4.6.1-1.el9.noarch.rpm

  - type: signing
