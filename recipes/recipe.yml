---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: monk-blue
# description will be included in the image's metadata
description: This is my personal OS image.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/silverblue-main
image-version: latest # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: akmods
    # base: asus # if not specified, classic "main" base is used by default
    install: []
    nvidia-driver: nvidia-open

  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  - type: fonts
    fonts:
      nerd-fonts:
        - JetBrainsMono

  - type: kargs
    kargs:
      - quiet
      - rw
      # nvidia (hybrid AMD+nvidia laptop)
      - rd.driver.blacklist=nouveau,nova_core
      - modprobe.blacklist=nouveau,nova_core
      - nvidia.NVreg_EnableS0ixPowerManagement=1
      - nvidia.NVreg_DynamicPowerManagement=0x02
      # boot/perf tuning
      - rcutree.enable_rcu_lazy=1
      - plymouth.use-simpledrm=1
      - plymouth.enable=0
      - amdgpu.seamless=1
      - clearcpuid=rdseed

  - type: gnome-extensions
    install:
      - 1160  # Dash to Panel
      - 2932  # Executor
      - 4839  # Clipboard History
      - 517   # Caffeine
      - 2236  # Night Theme Switcher
      - 615   # AppIndicator and KStatusNotifierItem Support
      - 9875  # O-tiling
      - 4998  # Legacy (GTK3) Theme Scheme Auto Switcher
      - 1401  # Bluetooth Quick Connect
      - 3193  # Blur my Shell
      - 10046 # Custom Touchpad Gestures

  - type: dnf
    # clean removal first, in its own transaction, so nothing is trying to
    # install/keep firefox while this removes it and its exact-version-pinned
    # langpacks dependency
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - tuned-ppd
        - tuned # using power-profiles-daemon instead

  - type: dnf
    repos:
      keys:
        - "https://pkgs.tailscale.com/stable/fedora/repo.gpg"
        - "https://repo.vscodium.dev/vscodium.gpg"
        - "https://packages.mozilla.org/rpm/firefox/signing-key.gpg"
      files:
        - "https://pkgs.tailscale.com/stable/fedora/tailscale.repo"
        - "https://repo.vscodium.dev/vscodium.repo"
        - "mozilla-firefox.repo" # local file: files/dnf/mozilla-firefox.repo
      nonfree: rpmfusion
      copr:
        - atim/starship
        - bieszczaders/kernel-cachyos-addons
        - itotm/cachyos-kernel-znver4 # used to overlay cachy-os kernel if needed
    install:
      packages:
        - micro
        - starship
        # cachy os
        - ananicy-cpp
        # utilities
        - pam-u2f
        - pamu2fcfg
        - power-profiles-daemon
        - powertop
        - zsh
        - git
        - git-lfs
        - btop
        - zoxide
        - fzf
        - sysbench
        - tmux
        - s-tui
        - tailscale # make sure repo is added above
        - codium # VSCodium: open-source VS Code build, no MS branding/telemetry
        - repo: mozilla-firefox # explicitly source from Mozilla, not Fedora
          packages:
            - firefox

  - type: default-flatpaks
    configurations:
      - notify: true # Send notification after install/uninstall is finished (true/false)
        scope: system
        # If no repo information is specified, Flathub will be used by default
        install: # system flatpaks we want all users to have and not remove
          - be.alexandervanhee.gradia
          - com.github.PintaProject.Pinta
          - com.github.tchx84.Flatseal
          - com.google.Chrome
          - com.mattjakeman.ExtensionManager
          - com.moonlight_stream.Moonlight
          - com.ranfdev.DistroShelf
          - com.sublimehq.SublimeText
          - dev.deedles.Trayscale
          - net.cozic.joplin_desktop
          - net.nokyan.Resources
          - org.gnome.Calculator
          - org.gnome.Calendar
          - org.gnome.Characters
          - org.gnome.clocks
          - org.gnome.Connections
          - org.gnome.Extensions
          - org.gnome.FileRoller
          - org.gnome.Firmware
          - org.gnome.font-viewer
          - org.gnome.Logs
          - org.gnome.Loupe
          - org.gnome.NautilusPreviewer
          - org.gnome.Papers
          - org.gnome.SimpleScan
          - org.gnome.Snapshot
          - org.gnome.Weather
          - page.tesk.Refine
      - scope: user # Also add Flathub user repo, but no user packages

  - type: signing # this sets up the proper policy & signing files for signed images to work fully
