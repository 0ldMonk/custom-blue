---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: monk-blue-nvidia-cosmic
description: This is my personal OS image (nvidia-hybrid laptop, COSMIC desktop).

# base-main (not silverblue-main): the desktop-less ublue base. COSMIC is layered
# via dnf below. Still a ublue image, so nvidia.yml's akmods match its kernel.
base-image: ghcr.io/ublue-os/base-main
image-version: latest

modules:

  - from-file: modules/nvidia.yml # must stay FIRST — mesa i686 multilib conflict (see nvidia-gnome.yml)

  - from-file: modules/common-files.yml
  - from-file: modules/common-fonts.yml
  - from-file: modules/common-kargs.yml
  - from-file: modules/common-packages.yml
  - from-file: modules/common-firefox.yml
  - from-file: modules/common-brew.yml
  # no common-gnome-extensions / common-flatpaks — those are the GNOME side
  - type: signing

  # COSMIC desktop from Fedora 44's own repos (no COPR). base-main ships no DE
  # and no display manager, so we install the group, add the greeter, enable it,
  # and switch the default target to graphical.
  - type: dnf
    group-install:
      packages:
        - cosmic-desktop
    install:
      packages:
        - cosmic-greeter
  - type: systemd
    system:
      enabled:
        - cosmic-greeter.service
  - type: script
    snippets:
      - "systemctl set-default graphical.target"

  # /etc/environment EGL→mesa pin (iGPU-display + nvidia-compute hybrid);
  # files/nvidia-hybrid/ dir is shared with nvidia-gnome.
  - type: files
    files:
      - source: nvidia-hybrid
        destination: /

  - type: kargs
    kargs:
      - rcutree.enable_rcu_lazy=1

  - type: dnf
    repos:
      copr:
        - bieszczaders/kernel-cachyos-addons # provides ananicy-cpp
        - itotm/cachyos-kernel-znver4 # used to overlay cachy-os kernel if needed
    # No tuned-ppd/power-profiles-daemon swap here (unlike nvidia-gnome):
    # cosmic-settings hard-requires tuned-ppd, and ppd Conflicts it (both
    # provide ppd-service). Removing tuned-ppd cascades cosmic-settings ->
    # cosmic-session -> the whole desktop out of the image.
    install:
      packages:
        - ananicy-cpp
        - pam-u2f
        - pamu2fcfg
        - fido2-tools
