---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
# GNOME-only bits: shell extensions + gnome-tweaks. Included only by the GNOME
# recipe (nvidia-gnome) — gnome-tweaks lives here, not in common-packages.yml,
# so the DE-agnostic COSMIC image (nvidia-cosmic) doesn't drag it in.
modules:
  - type: gnome-extensions
    install:
      - 1160  # Dash to Panel
      - 2932  # Executor
      - 4839  # Clipboard History
      - 517   # Caffeine
      - 2236  # Night Theme Switcher
      - 615   # AppIndicator and KStatusNotifierItem Support
     # - 9875  # O-tiling
      - 4998  # Legacy (GTK3) Theme Scheme Auto Switcher
      - 1401  # Bluetooth Quick Connect
      - 3193  # Blur my Shell
      - 10046 # Custom Touchpad Gestures
  - type: dnf
    install:
      packages:
        - gnome-tweaks
