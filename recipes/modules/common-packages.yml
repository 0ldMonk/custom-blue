---
# yaml-language-server: $schema=https://schema.blue-build.org/module-v1.json
modules:
  - from-file: modules/common-cli.yml
  - from-file: modules/common-initrd-unlock.yml
  - type: dnf
    repos:
      keys:
        - "https://repo.vscodium.dev/vscodium.gpg"
        - "https://pkg.claude-desktop-debian.dev/KEY.gpg"
      files:
        - "https://repo.vscodium.dev/vscodium.repo"
        - "https://pkg.claude-desktop-debian.dev/rpm/claude-desktop-unofficial.repo"
      nonfree: rpmfusion
    install:
      packages:
        - powertop
        - s-tui
        - codium # VSCodium: open-source VS Code build, no MS branding/telemetry
        - claude-desktop-unofficial
