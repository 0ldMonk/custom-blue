---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
modules:
  - type: dnf
    repos:
      keys:
        - "https://pkgs.tailscale.com/stable/fedora/repo.gpg"
        - "https://download.docker.com/linux/fedora/gpg"
      files:
        - "https://pkgs.tailscale.com/stable/fedora/tailscale.repo"
        - "https://download.docker.com/linux/fedora/docker-ce.repo"
      copr:
        - atim/starship
    remove:
      packages:
        - nano-default-editor # conflicts with vim-default-editor
        - vim-minimal # owns /usr/bin/vi; drop it so the vi->vim symlink below
                      # (script module) owns that path cleanly instead of
                      # shadowing an RPM-owned file
    install:
      packages:
        - micro
        - vim-enhanced
        - vim-default-editor
        - starship
        - zsh
        - zsh-autosuggestions
        - git
        - git-lfs
        - btop
        - htop
        - zoxide
        - fzf
        - jq
        - sysbench
        - tmux
        - tailscale
        - rsync
        - traceroute
        - fping
        - expect
        - axel
        - smartmontools
        - iftop
        - nmon
        - nvtop

  # ostree never overwrites already-existing local /etc content on upgrade,
  # so this only affects NEW accounts (and root, which already exists in the
  # base image) — not already-deployed desktop accounts, which were
  # switched to zsh live via `chsh`.
  - type: script
    snippets:
      - "sed -i 's|^SHELL=.*|SHELL=/usr/bin/zsh|' /etc/default/useradd"
      - "usermod --shell /usr/bin/zsh root" # chsh (util-linux) is missing from
                                             # the base image; usermod (shadow-utils) does the same job

      # `vi` (/usr/bin/vi) comes from vim-minimal; point it at the vim-enhanced
      # binary so `vi` == full vim everywhere (scripts/sudo too, not just an
      # interactive shell alias). Relative target resolves within /usr/bin.
      - "ln -sf vim /usr/bin/vi"

      # /etc/zshrc (shipped by the zsh package) is sourced by every interactive
      # zsh shell regardless of whether a per-user ~/.zshrc exists, so this
      # reaches root and any account created later (e.g. the VM's cloud-init
      # pi user) without depending on /etc/skel or home-dir timing.
      - "echo 'source /etc/zsh-custom-config/zsh-extra.zsh' >> /etc/zshrc"
